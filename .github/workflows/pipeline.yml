name: "Terraform CI"

# Trigger the workflow on push events to the main branch
on:
  push:
    branches: [ main ]

jobs:
  # Job to validate and lint Terraform code
  terraform-lint:
    name: "Linting and Formatting"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code onto the runner
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # Step 2: Set up the HashiCorp Terraform CLI
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      # Step 3: Check that all Terraform configuration files adhere to a canonical format
      - name: "Check Format"
        run: terraform fmt -check